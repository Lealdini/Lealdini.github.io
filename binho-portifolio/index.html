<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0B" />
    <meta name="color-scheme" content="dark light" />

    <!-- Security headers (best-effort via meta on static hosting) -->
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; script-src 'self'; frame-src 'self'; media-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self' mailto:;">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="strict-origin-when-cross-origin">

    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Preload do portrait do hero — melhora LCP -->
    <link
      rel="preload"
      as="image"
      href="/images/binho-768.webp"
      type="image/webp"
      imagesrcset="/images/binho-512.webp 512w, /images/binho-768.webp 768w, /images/binho-1024.webp 1024w"
      imagesizes="(max-width: 768px) 200px, 320px"
      fetchpriority="high"
    />

    <title>Fábio Lealdini | Portfolio</title>
    <meta name="title" content="Fábio Lealdini | Portfolio" />
    <meta name="description" content="Android Developer & Tech Lead. Over 7 years turning coffee into apps used by millions." />
    <meta name="author" content="Fábio Lealdini" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta property="og:url" content="https://lealdini.github.io/" />
    <meta property="og:title" content="Fábio Lealdini | Tech Lead & Android Developer" />
    <meta property="og:description" content="Android Developer & Tech Lead. Over 7 years turning coffee into apps used by millions. Check out my work, experiments with AI, and talks." />
    <meta property="og:image" content="https://lealdini.github.io/logo512.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://lealdini.github.io/" />
    <meta property="twitter:title" content="Fábio Lealdini | Tech Lead & Android Developer" />
    <meta property="twitter:description" content="Android Developer & Tech Lead. Over 7 years turning coffee into apps used by millions. Check out my work, experiments with AI, and talks." />
    <meta property="twitter:image" content="https://lealdini.github.io/logo512.png" />

    <!-- Inline script: aplica tema antes do paint para evitar flash -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = saved === 'light' || saved === 'dark' ? saved : (prefersDark ? 'dark' : 'light');
          if (theme === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body class="bg-background">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.js"></script>
  </body>
</html>
